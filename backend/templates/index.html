<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerScope - Your North Star in a Shifting Economy</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet">

    <!-- React & Babel via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS (for layout utilities, keeping custom theme colors) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            cream: '#FAF8F5',
                            orange: '#E85D04',
                            dark: '#0D0D0D',
                            border: '#E0DAD2'
                        }
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FAF8F5;
            color: #0D0D0D;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Playfair Display', serif;
        }

        .card {
            background-color: white;
            border: 1px solid #E0DAD2;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background-color: #0D0D0D;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: #E85D04;
        }

        .btn-outline {
            border: 1px solid #0D0D0D;
            color: #0D0D0D;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-outline:hover {
            background-color: #0D0D0D;
            color: white;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #E0DAD2;
            border-radius: 6px;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #E85D04;
        }

        /* Chatbot floating UI */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 50;
        }

        .chat-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #E85D04;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(232, 93, 4, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .chat-btn:hover {
            transform: scale(1.05);
        }

        .chat-panel {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 320px;
            height: 450px;
            background-color: #1A1A1A;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform-origin: bottom right;
            transition: all 0.3s;
        }

        .chat-header {
            padding: 16px;
            background-color: #242424;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }

        .chat-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #333;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background-color: #242424;
            border: 1px solid #444;
            color: white;
            border-radius: 20px;
            padding: 8px 16px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #E85D04;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .chat-user {
            background-color: #E85D04;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-bot {
            background-color: #333;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    {% raw %}
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_BASE = 'http://localhost:5000/api';

        // Custom Hook for global user state
        function useAuth() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(`${API_BASE}/auth/me`, { credentials: 'omit' })
                    .then(res => res.json().catch(() => ({})))
                    .catch(() => ({}))
                    .then(data => {
                        const localUser = localStorage.getItem('cs_user');
                        if (data && data.success) {
                            setUser(data.user);
                        } else if (localUser) {
                            setUser(JSON.parse(localUser));
                        } else {
                            setUser(null);
                        }
                        setLoading(false);
                    });
            }, []);

            const login = (userData) => {
                setUser(userData);
                localStorage.setItem('cs_user', JSON.stringify(userData));
            };

            const logout = () => {
                setUser(null);
                localStorage.removeItem('cs_user');
                fetch(`${API_BASE}/auth/logout`, { method: 'POST', credentials: 'omit' }).catch(() => { });
            };

            return { user, loading, login, logout };
        }

        // --- COMPONENTS ---

        function Navbar({ user, logout, currentPage, setPage }) {
            return (
                <nav className="sticky top-0 bg-white border-b border-brand-border z-40 px-6 py-4 flex justify-between items-center">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setPage('home')}>
                        <div className="w-4 h-4 rounded-full bg-brand-orange"></div>
                        <span className="font-heading font-bold text-xl tracking-tight">Career<span className="text-brand-orange">Scope</span></span>
                    </div>

                    <div className="flex items-center gap-6 font-medium">
                        <button
                            onClick={() => setPage('home')}
                            className={`${currentPage === 'home' ? 'text-brand-orange border-b-2 border-brand-orange' : 'text-brand-dark hover:text-brand-orange'}`}
                        >Home</button>

                        <button
                            onClick={() => setPage('colleges')}
                            className={`${currentPage === 'colleges' ? 'text-brand-orange border-b-2 border-brand-orange' : 'text-brand-dark hover:text-brand-orange'}`}
                        >Colleges</button>

                        {!user ? (
                            <>
                                <button onClick={() => setPage('login')} className="hover:text-brand-orange">Login</button>
                                <button onClick={() => setPage('register')} className="btn-primary">Register</button>
                            </>
                        ) : (
                            <>
                                <span className="text-gray-500">Hi, {user.name.split(' ')[0]}</span>
                                <button onClick={() => { logout(); setPage('login'); }} className="hover:text-brand-orange">Logout</button>
                            </>
                        )}
                    </div>
                </nav>
            );
        }

        function Chatbot({ user }) {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([{ sender: 'bot', text: 'Hi there! I am your CareerScope assistant. How can I help you today?' }]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatBodyRef = useRef(null);

            useEffect(() => {
                if (chatBodyRef.current) {
                    chatBodyRef.current.scrollTop = chatBodyRef.current.scrollHeight;
                }
            }, [messages, isOpen, isTyping]);

            if (!user) return null; // Only show when logged in

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const userMsg = input.trim();
                setMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
                setInput('');
                setIsTyping(true);

                try {
                    // Create a mock response if fetch fails
                    const res = await fetch(`${API_BASE}/chatbot/query`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg, user_id: user.id })
                    });

                    const data = await res.json();
                    setMessages(prev => [...prev, { sender: 'bot', text: data.response }]);
                } catch (err) {
                    setMessages(prev => [...prev, { sender: 'bot', text: "Sorry, I'm having trouble connecting right now." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="chat-widget font-body">
                    {isOpen && (
                        <div className="chat-panel">
                            <div className="chat-header">
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 rounded-full bg-brand-orange"></div>
                                    <span className="font-bold">Assistant</span>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-gray-400 hover:text-white">✕</button>
                            </div>

                            <div className="chat-body" ref={chatBodyRef}>
                                {messages.map((msg, i) => (
                                    <div key={i} className={`chat-bubble ${msg.sender === 'user' ? 'chat-user' : 'chat-bot'}`}>
                                        {msg.text}
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="chat-bubble chat-bot italic text-gray-400 text-sm">Typing...</div>
                                )}
                            </div>

                            <form onSubmit={handleSend} className="chat-input-area">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                    placeholder="Ask about colleges..."
                                    className="chat-input text-sm"
                                />
                                <button type="submit" className="bg-brand-orange w-10 h-10 rounded-full flex items-center justify-center text-white hover:bg-orange-600 transition">
                                    ➤
                                </button>
                            </form>
                        </div>
                    )}

                    {!isOpen && (
                        <button className="chat-btn" onClick={() => setIsOpen(true)}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        </button>
                    )}
                </div>
            );
        }

        // --- PAGES ---

        function RegisterPage({ setPage }) {
            const [form, setForm] = useState({ name: '', email: '', password: '', class_level: '12', stream: 'Science' });
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const res = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form)
                    });
                    const data = await res.json();
                    if (data.success) {
                        setPage('login');
                    } else {
                        setError(data.message || data.error);
                    }
                } catch (err) {
                    setError('Connection error');
                }
            };

            return (
                <div className="min-h-[80vh] flex items-center justify-center px-4">
                    <div className="card p-8 max-w-md w-full">
                        <h2 className="text-3xl font-heading font-bold text-center mb-6">Create Account</h2>
                        {error && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm">{error}</div>}

                        <form onSubmit={handleSubmit}>
                            <input type="text" placeholder="Full Name" required className="input-field"
                                onChange={e => setForm({ ...form, name: e.target.value })} />
                            <input type="email" placeholder="Email Address" required className="input-field"
                                onChange={e => setForm({ ...form, email: e.target.value })} />
                            <input type="password" placeholder="Password" required className="input-field"
                                onChange={e => setForm({ ...form, password: e.target.value })} />

                            <div className="flex gap-4 mb-4">
                                <select className="input-field mb-0" onChange={e => setForm({ ...form, class_level: e.target.value })}>
                                    <option value="12">Class 12</option>
                                    <option value="11">Class 11</option>
                                    <option value="10">Class 10</option>
                                </select>
                                <select className="input-field mb-0" onChange={e => setForm({ ...form, stream: e.target.value })}>
                                    <option value="Science">Science</option>
                                    <option value="Commerce">Commerce</option>
                                    <option value="Arts">Arts</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <button type="submit" className="btn-primary w-full py-3 text-lg mt-2">Register</button>
                        </form>

                        <p className="text-center mt-6 text-gray-600">
                            Already have an account? <button onClick={() => setPage('login')} className="text-brand-orange font-medium hover:underline">Login</button>
                        </p>
                    </div>
                </div>
            );
        }

        function LoginPage({ setPage, login }) {
            const [form, setForm] = useState({ email: '', password: '' });
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const res = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form)
                    });
                    const data = await res.json();
                    if (data.success) {
                        login(data.user);
                        setPage('home');
                    } else {
                        setError(data.message || data.error);
                    }
                } catch (err) {
                    setError('Connection error');
                }
            };

            return (
                <div className="min-h-[80vh] flex items-center justify-center px-4">
                    <div className="card p-8 max-w-md w-full">
                        <h2 className="text-3xl font-heading font-bold text-center mb-6">Welcome Back</h2>
                        {error && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm">{error}</div>}

                        <form onSubmit={handleSubmit}>
                            <input type="email" placeholder="Email Address" required className="input-field"
                                onChange={e => setForm({ ...form, email: e.target.value })} />
                            <input type="password" placeholder="Password" required className="input-field"
                                onChange={e => setForm({ ...form, password: e.target.value })} />

                            <button type="submit" className="btn-primary w-full py-3 text-lg mt-2">Login</button>
                        </form>

                        <p className="text-center mt-6 text-gray-600">
                            Don't have an account? <button onClick={() => setPage('register')} className="text-brand-orange font-medium hover:underline">Register</button>
                        </p>
                    </div>
                </div>
            );
        }

        function CareerSuggestions({ careers, setProfile, setPage }) {
            const [recommendedColleges, setRecommendedColleges] = useState([]);

            useEffect(() => {
                if (careers.length > 0) {
                    // Fetch top 3 colleges matching the top career's type
                    const topType = careers[0].college_type || careers[0].type;
                    fetch(`${API_BASE}/colleges?type=${topType}&sort=rating&limit=3&page=1`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) setRecommendedColleges(data.colleges);
                        })
                        .catch(err => console.error(err));
                }
            }, [careers]);

            const navigateToColleges = (typeFilter) => {
                setPage('colleges');
                localStorage.setItem("cs_initial_filter", typeFilter);
            };

            if (careers.length === 0) return <div className="text-center py-10">Loading recommendations...</div>;

            return (
                <div id="careers-section" className="max-w-6xl mx-auto my-16 px-6 animate-fade-in-up">
                    <div className="text-center mb-12">
                        <h2 className="text-4xl font-heading font-bold mb-4">Your Career <span className="text-brand-orange italic">Matches</span></h2>
                        <p className="text-gray-600 max-w-2xl mx-auto">Based on your profile and interests</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16">
                        {careers.map((career, idx) => (
                            <div
                                key={idx}
                                className="card p-6 flex flex-col h-full hover:-translate-y-1 transition duration-300 relative"
                                style={career.recommended ? { borderLeft: '4px solid #E85D04' } : {}}
                            >
                                {career.recommended && (
                                    <span className="absolute top-4 right-4 bg-orange-100 text-brand-orange text-xs font-bold px-2 py-1 rounded-full">
                                        ⭐ Top Match
                                    </span>
                                )}

                                <div className="text-5xl text-center mb-4">{career.icon || '🎯'}</div>
                                <h3 className="text-xl font-heading font-bold mb-2 text-center" style={{ fontSize: '1.1rem' }}>{career.name || career.title}</h3>
                                <p className="text-gray-500 text-sm flex-grow mb-6 text-center line-clamp-2">{career.description || career.desc}</p>

                                <div className="flex flex-col gap-4 mt-auto">
                                    <div className="bg-brand-orange text-white text-xs font-bold py-1 px-3 rounded-full self-center">
                                        {career.salary}
                                    </div>
                                    <button
                                        onClick={() => navigateToColleges(career.college_type || career.type)}
                                        className="btn-outline w-full text-sm font-bold mt-2 hover:bg-brand-dark hover:text-white"
                                    >
                                        Explore Colleges →
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Recommended Colleges Section */}
                    {recommendedColleges.length > 0 && (
                        <div className="border-t border-gray-200 pt-16">
                            <div className="flex justify-between items-end mb-8">
                                <div>
                                    <h2 className="text-3xl font-heading font-bold mb-2">Recommended Colleges for You</h2>
                                    <p className="text-gray-600 text-sm">Top institutions offering {careers[0].college_type || careers[0].type} programs</p>
                                </div>
                                <button
                                    onClick={() => navigateToColleges(careers[0].college_type || careers[0].type)}
                                    className="text-brand-orange font-bold text-sm hover:underline"
                                >
                                    View All →
                                </button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {recommendedColleges.map((col, idx) => (
                                    <div key={idx} className="card p-4 flex flex-col hover:border-brand-orange transition cursor-pointer" onClick={() => navigateToColleges(col.type)}>
                                        <h4 className="font-bold text-lg leading-tight mb-1">{col.name}</h4>
                                        <p className="text-xs text-gray-500 mb-3">{col.city}, {col.state}</p>

                                        <div className="flex justify-between items-center text-sm">
                                            <span className="flex items-center text-yellow-500 font-bold">
                                                ★ {col.rating}
                                            </span>
                                            <span className="text-gray-700 bg-gray-100 px-2 py-1 rounded text-xs font-medium">
                                                {col.placement_pct} Placement
                                            </span>
                                        </div>
                                        <div className="mt-3 text-xs text-brand-dark font-medium">
                                            Avg. Fees: {col.fees}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="mt-16 text-center">
                        <button onClick={() => setProfile(null)} className="text-gray-400 hover:text-gray-600 underline text-sm transition">
                            Retake Questionnaire
                        </button>
                    </div>
                </div>
            );
        }

        function HomePage({ user, setPage }) {
            const [profile, setProfile] = useState(null);
            const [careers, setCareers] = useState([]);
            const [loading, setLoading] = useState(true);

            // Wizard State
            const [step, setStep] = useState(1);
            const [quiz, setQuiz] = useState({
                class_level: '12',
                stream: 'Science',
                marks: { Math: '', Science: '', English: '', 'Social Studies': '' },
                interests: []
            });

            const interestsList = ['Technology', 'Medicine', 'Law', 'Business', 'Design/Art', 'Teaching', 'Engineering', 'Finance', 'Sports', 'Music', 'Writing', 'Environment', 'Psychology', 'Agriculture'];

            useEffect(() => {
                if (user) {
                    fetchProfileAndCareers();
                } else {
                    setLoading(false);
                }
            }, [user]);

            const fetchProfileAndCareers = async () => {
                try {
                    const profileRes = await fetch(`${API_BASE}/quiz/profile?user_id=${user.id}`);
                    const profileData = await profileRes.json();

                    if (profileData.has_profile) {
                        setProfile(profileData.profile);

                        const careersRes = await fetch(`${API_BASE}/careers/suggest?user_id=${user.id}`);
                        const careersData = await careersRes.json();
                        if (careersData.success) {
                            setCareers(careersData.careers);
                        }
                    }
                } catch (e) {
                    console.error("Error fetching profile", e);
                }
                setLoading(false);
            };

            const submitQuiz = async () => {
                try {
                    const payload = {
                        class_level: quiz.class_level,
                        stream: quiz.stream,
                        math_score: quiz.marks.Math || 0,
                        science_score: quiz.marks.Science || 0,
                        english_score: quiz.marks.English || 0,
                        social_score: quiz.marks['Social Studies'] || 0,
                        interests: quiz.interests
                    };

                    const res = await fetch(`${API_BASE}/quiz/submit`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();

                    if (data.success) {
                        setCareers(data.careers);
                        setProfile(payload); // Trigger UI transition to show careers

                        // Scroll down a bit to show results smoothly
                        setTimeout(() => {
                            window.scrollTo({ top: document.getElementById("careers-section")?.offsetTop - 80, behavior: 'smooth' });
                        }, 300);
                    }
                } catch (e) {
                    console.error("Failed to submit quiz", e);
                }
            };

            const toggleInterest = (interest) => {
                setQuiz(prev => ({
                    ...prev,
                    interests: prev.interests.includes(interest)
                        ? prev.interests.filter(i => i !== interest)
                        : [...prev.interests, interest]
                }));
            };

            const renderWizard = () => {
                return (
                    <div className="max-w-3xl mx-auto my-16 card p-8 border-t-4 border-t-brand-orange">
                        <div className="flex justify-between mb-8 relative">
                            <div className="absolute top-1/2 left-0 w-full h-1 bg-gray-200 -z-10 -translate-y-1/2"></div>
                            <div className="absolute top-1/2 left-0 h-1 bg-brand-orange -z-10 -translate-y-1/2 transition-all" style={{ width: `${((step - 1) / 3) * 100}%` }}></div>

                            {[1, 2, 3, 4].map(s => (
                                <div key={s} className={`w-8 h-8 rounded-full flex items-center justify-center font-bold ${step >= s ? 'bg-brand-orange text-white' : 'bg-gray-200 text-gray-500'}`}>
                                    {s}
                                </div>
                            ))}
                        </div>

                        {step === 1 && (
                            <div className="text-center">
                                <h3 className="text-2xl font-heading font-bold mb-6">Which class are you in?</h3>
                                <select className="input-field max-w-xs mx-auto text-center text-lg" value={quiz.class_level} onChange={e => setQuiz({ ...quiz, class_level: e.target.value })}>
                                    <option value="12">Class 12</option>
                                    <option value="11">Class 11</option>
                                    <option value="10">Class 10</option>
                                    <option value="9">Class 9</option>
                                    <option value="8">Class 8</option>
                                    <option value="7">Class 7</option>
                                    <option value="6">Class 6</option>
                                </select>
                                <button onClick={() => setStep(2)} className="btn-primary mt-6 px-8">Next →</button>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="text-center">
                                <h3 className="text-2xl font-heading font-bold mb-6">What is your stream?</h3>
                                <div className="grid grid-cols-2 gap-4 max-w-md mx-auto">
                                    {['Science', 'Commerce', 'Arts', 'Other'].map(s => (
                                        <div key={s}
                                            onClick={() => setQuiz({ ...quiz, stream: s })}
                                            className={`p-4 border rounded cursor-pointer transition ${quiz.stream === s ? 'border-brand-orange bg-orange-50 text-brand-orange font-bold' : 'border-gray-200 hover:border-gray-300'}`}>
                                            {s}
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-center gap-4 mt-8">
                                    <button onClick={() => setStep(1)} className="btn-outline px-8">← Back</button>
                                    <button onClick={() => setStep(3)} className="btn-primary px-8">Next →</button>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div>
                                <h3 className="text-2xl font-heading font-bold mb-6 text-center">Enter your subject marks (out of 100)</h3>
                                <div className="grid grid-cols-2 gap-6 max-w-md mx-auto">
                                    {['Math', 'Science', 'English', 'Social Studies'].map(subj => (
                                        <div key={subj}>
                                            <label className="block text-sm font-bold mb-2 text-gray-700">{subj}</label>
                                            <input type="number" max="100" min="0" className="input-field mb-0"
                                                value={quiz.marks[subj]}
                                                onChange={e => setQuiz({ ...quiz, marks: { ...quiz.marks, [subj]: parseInt(e.target.value) || '' } })}
                                            />
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-center gap-4 mt-8">
                                    <button onClick={() => setStep(2)} className="btn-outline px-8">← Back</button>
                                    <button onClick={() => setStep(4)} className="btn-primary px-8">Next →</button>
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div>
                                <h3 className="text-2xl font-heading font-bold mb-6 text-center">Select your interests</h3>
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                    {interestsList.map(int => (
                                        <div key={int}
                                            onClick={() => toggleInterest(int)}
                                            className={`p-3 text-center border rounded cursor-pointer text-sm font-medium transition ${quiz.interests.includes(int) ? 'bg-brand-dark text-white border-brand-dark' : 'bg-white border-gray-200 hover:border-gray-300 text-gray-700'}`}>
                                            {int}
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-center gap-4 mt-8">
                                    <button onClick={() => setStep(3)} className="btn-outline px-8">← Back</button>
                                    <button onClick={submitQuiz} className="btn-primary px-8 bg-brand-orange hover:bg-orange-600 border-none">Get Recommendations ✨</button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div>
                    {/* Hero Section */}
                    <div className="pt-20 pb-16 px-6 text-center max-w-4xl mx-auto">
                        <h1 className="text-5xl md:text-7xl font-heading font-bold tracking-tight text-brand-dark mb-4 leading-tight">
                            Your North Star <br />
                            <span className="text-brand-orange italic">in a Shifting Economy</span>
                        </h1>
                        <p className="text-lg md:text-xl text-gray-600 mb-10 max-w-2xl mx-auto leading-relaxed">
                            We don't list jobs — we architect trajectories. Discover where your skills meet the future of work, guided by data and human wisdom.
                        </p>

                        <div className="flex flex-col sm:flex-row gap-2 max-w-xl mx-auto relative">
                            <input type="text" placeholder="Where do you want to lead?" className="input-field mb-0 py-4 px-6 text-lg rounded-full shadow-sm" />
                            <button onClick={() => setPage('colleges')} className="btn-primary rounded-full px-8 py-4 text-lg absolute right-1 top-1 bottom-1">
                                Discover →
                            </button>
                        </div>

                        <div className="flex justify-center items-center gap-12 mt-16 text-gray-500 font-medium">
                            <div className="flex flex-col"><span className="text-3xl font-bold text-brand-dark">500+</span> Colleges</div>
                            <div className="flex flex-col"><span className="text-3xl font-bold text-brand-dark">120+</span> Careers</div>
                            <div className="flex flex-col"><span className="text-3xl font-bold text-brand-dark">10K+</span> Students</div>
                        </div>
                    </div>

                    {!user ? (
                        <div className="text-center py-12 bg-white border-y border-gray-100">
                            <h2 className="text-2xl font-heading font-bold mb-4">Ready to find your path?</h2>
                            <button onClick={() => setPage('register')} className="btn-primary py-3 px-8 text-lg shadow-lg">Start the Questionnaire</button>
                        </div>
                    ) : (
                        <div className="bg-white border-t border-gray-100 py-10">
                            {loading ? (
                                <div className="text-center py-20 text-gray-500">Loading your profile...</div>
                            ) : profile ? (
                                <CareerSuggestions careers={careers} setProfile={setProfile} setPage={setPage} />
                            ) : (
                                renderWizard()
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function CollegesPage() {
            const [colleges, setColleges] = useState([]);
            const [filters, setFilters] = useState({
                search: '',
                type: localStorage.getItem('cs_initial_filter') || 'All',
                state: '',
                sort: 'rating',
                page: 1
            });
            const [meta, setMeta] = useState({ total: 0, pages: 1, states: [] });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                localStorage.removeItem('cs_initial_filter');
            }, []);

            useEffect(() => {
                fetchColleges();
            }, [filters]);

            const fetchColleges = async () => {
                setLoading(true);
                try {
                    const params = new URLSearchParams({
                        search: filters.search,
                        type: filters.type,
                        state: filters.state,
                        sort: filters.sort,
                        page: filters.page
                    });
                    const res = await fetch(`${API_BASE}/colleges?${params}`);
                    const data = await res.json();

                    if (data.success) {
                        if (filters.page === 1) {
                            setColleges(data.colleges);
                        } else {
                            setColleges(prev => [...prev, ...data.colleges]);
                        }
                        setMeta({ total: data.total, pages: data.pages, states: data.available_states || data.states || [] });
                    }
                } catch (e) {
                    console.error("Failed to fetch colleges");
                }
                setLoading(false);
            };

            const handleSearchChange = (e) => {
                setFilters({ ...filters, search: e.target.value, page: 1 });
            };

            return (
                <div className="max-w-7xl mx-auto px-6 py-12">
                    <div className="mb-10">
                        <h1 className="text-4xl font-heading font-bold mb-2">Explore Colleges</h1>
                        <p className="text-gray-600">Find the right institution to build your career foundation.</p>
                    </div>

                    {/* Filter Bar */}
                    <div className="card p-4 mb-8 flex flex-wrap gap-4 items-center bg-white sticky top-20 z-30">
                        <input
                            type="text"
                            placeholder="Search by name or city..."
                            className="input-field mb-0 flex-grow min-w-[200px]"
                            value={filters.search}
                            onChange={handleSearchChange}
                        />

                        <select className="input-field mb-0 w-auto" value={filters.type} onChange={e => setFilters({ ...filters, type: e.target.value, page: 1 })}>
                            <option value="All">All Types</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Medical">Medical</option>
                            <option value="Commerce">Commerce</option>
                            <option value="Arts">Arts</option>
                            <option value="Management">Management</option>
                            <option value="Law">Law</option>
                            <option value="Design">Design</option>
                        </select>

                        <select className="input-field mb-0 w-auto" value={filters.state} onChange={e => setFilters({ ...filters, state: e.target.value, page: 1 })}>
                            <option value="">All States</option>
                            {meta.states.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>

                        <select className="input-field mb-0 w-auto bg-gray-50 font-medium" value={filters.sort} onChange={e => setFilters({ ...filters, sort: e.target.value, page: 1 })}>
                            <option value="rating">Sort: Rating (High to Low)</option>
                            <option value="placements">Sort: Placements</option>
                            <option value="fees">Sort: Fees (Low to High)</option>
                            <option value="name">Sort: Name (A-Z)</option>
                        </select>
                    </div>

                    {/* Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {colleges.map(c => (
                            <div key={c.id} className="card overflow-hidden hover:shadow-xl transition-shadow flex flex-col">
                                <div className="h-32 bg-gray-100 relative">
                                    <div className="absolute top-4 right-4 bg-white/90 px-2 py-1 rounded text-sm font-bold">
                                        ⭐ {c.rating}/5
                                    </div>
                                    <div className="absolute bottom-[-16px] left-4 bg-brand-orange text-white px-3 py-1 rounded-full text-xs font-bold shadow-md">
                                        {c.type}
                                    </div>
                                </div>
                                <div className="p-6 pt-8 flex-grow flex flex-col">
                                    <h3 className="text-xl font-heading font-bold mb-1 line-clamp-1">{c.name}</h3>
                                    <p className="text-gray-500 text-sm mb-4 flex items-center gap-1">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                        {c.city}, {c.state}
                                    </p>

                                    <div className="flex justify-between items-center bg-gray-50 p-3 rounded-lg mb-4 text-sm border border-gray-100">
                                        <div className="text-center">
                                            <span className="block text-gray-500 text-xs uppercase">Placements</span>
                                            <span className="font-bold text-brand-dark">{c.placement_pct}</span>
                                        </div>
                                        <div className="h-8 w-px bg-gray-200"></div>
                                        <div className="text-center">
                                            <span className="block text-gray-500 text-xs uppercase">Avg Fees/Yr</span>
                                            <span className="font-bold text-brand-dark">{c.fees}</span>
                                        </div>
                                    </div>

                                    <p className="text-gray-600 text-sm line-clamp-2 mb-4 flex-grow">{c.description}</p>

                                    <div className="flex flex-wrap gap-1 mb-4">
                                        {c.courses.map((course, i) => (
                                            <span key={i} className="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded border border-gray-200">{course}</span>
                                        ))}
                                    </div>

                                    <button className="w-full btn-outline mt-auto py-2">View Details</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {colleges.length === 0 && !loading && (
                        <div className="text-center py-20 text-gray-500">No colleges found matching your criteria.</div>
                    )}

                    {loading && (
                        <div className="text-center py-10">
                            <span className="inline-block w-8 h-8 border-4 border-brand-orange border-t-transparent rounded-full animate-spin"></span>
                        </div>
                    )}

                    {filters.page < meta.pages && !loading && (
                        <div className="mt-12 text-center">
                            <button
                                onClick={() => setFilters({ ...filters, page: filters.page + 1 })}
                                className="btn-outline px-8"
                            >
                                Show More
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // --- MAIN APP COMPONENT ---

        function App() {
            const { user, loading, login, logout } = useAuth();
            const [currentPage, setCurrentPage] = useState('home'); // home, colleges, login, register

            if (loading) {
                return <div className="h-screen flex items-center justify-center font-heading text-2xl text-brand-orange animate-pulse">CareerScope</div>;
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <Navbar user={user} logout={logout} currentPage={currentPage} setPage={setCurrentPage} />

                    <main className="flex-grow">
                        {currentPage === 'home' && <HomePage user={user} setPage={setCurrentPage} />}
                        {currentPage === 'colleges' && <CollegesPage />}
                        {currentPage === 'login' && <LoginPage setPage={setCurrentPage} login={login} />}
                        {currentPage === 'register' && <RegisterPage setPage={setCurrentPage} />}
                    </main>

                    {/* Global Chatbot UI */}
                    <Chatbot user={user} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    {% endraw %}
</body>

</html>
